<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="rgba(255,255,255,0.32)" stroke-linecap="round">
  <!-- Registration mark -->
  <g stroke-width="0.6" opacity="0.7">
    <line x1="22" y1="26" x2="42" y2="26"/>
    <line x1="32" y1="16" x2="32" y2="36"/>
  </g>

  <!-- Main building outline -->
  <rect x="72" y="60" width="256" height="190" stroke-width="1.3"/>

  <!-- Left wing extension -->
  <rect x="48" y="120" width="24" height="130" stroke-width="1.1"/>
  <!-- Right wing extension -->
  <rect x="328" y="120" width="24" height="130" stroke-width="1.1"/>

  <!-- 7 horizontal floor lines -->
  <g stroke-width="0.45" opacity="0.65">
    <line x1="72" y1="87" x2="328" y2="87"/>
    <line x1="72" y1="114" x2="328" y2="114"/>
    <line x1="72" y1="141" x2="328" y2="141"/>
    <line x1="72" y1="168" x2="328" y2="168"/>
    <line x1="72" y1="195" x2="328" y2="195"/>
    <line x1="72" y1="222" x2="328" y2="222"/>
  </g>

  <!-- Vertical window mullions -->
  <g stroke-width="0.35" opacity="0.5">
    <line x1="100" y1="60" x2="100" y2="250"/>
    <line x1="128" y1="60" x2="128" y2="250"/>
    <line x1="156" y1="60" x2="156" y2="250"/>
    <line x1="184" y1="60" x2="184" y2="250"/>
    <line x1="216" y1="60" x2="216" y2="250"/>
    <line x1="244" y1="60" x2="244" y2="250"/>
    <line x1="272" y1="60" x2="272" y2="250"/>
    <line x1="300" y1="60" x2="300" y2="250"/>
  </g>

  <!-- Left/right wing mullions -->
  <g stroke-width="0.35" opacity="0.5">
    <line x1="60" y1="120" x2="60" y2="250"/>
    <line x1="340" y1="120" x2="340" y2="250"/>
    <line x1="48" y1="145" x2="72" y2="145"/>
    <line x1="48" y1="175" x2="72" y2="175"/>
    <line x1="48" y1="205" x2="72" y2="205"/>
    <line x1="328" y1="145" x2="352" y2="145"/>
    <line x1="328" y1="175" x2="352" y2="175"/>
    <line x1="328" y1="205" x2="352" y2="205"/>
  </g>

  <!-- Central axis -->
  <line x1="200" y1="50" x2="200" y2="260" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- Main entrance (canopy + door) -->
  <rect x="174" y="222" width="52" height="28" stroke-width="1"/>
  <line x1="170" y1="242" x2="230" y2="242" stroke-width="1"/>
  <line x1="200" y1="222" x2="200" y2="250" stroke-width="0.4" opacity="0.5"/>

  <!-- Ground plane -->
  <line x1="24" y1="260" x2="376" y2="260" stroke-width="1"/>
  <line x1="12" y1="272" x2="388" y2="272" stroke-width="0.6" opacity="0.75"/>

  <!-- Medical "+" cross -->
  <g stroke-width="1" opacity="0.8">
    <line x1="266" y1="74" x2="278" y2="74"/>
    <line x1="272" y1="68" x2="272" y2="80"/>
  </g>

  <!-- Left dimension line -->
  <g stroke-width="0.45" opacity="0.6">
    <line x1="30" y1="60" x2="30" y2="260"/>
    <line x1="25" y1="60" x2="35" y2="60"/>
    <line x1="25" y1="260" x2="35" y2="260"/>
    <line x1="25" y1="160" x2="35" y2="160"/>
  </g>

  <!-- Bottom dimension line -->
  <g stroke-width="0.45" opacity="0.6">
    <line x1="48" y1="285" x2="352" y2="285"/>
    <line x1="48" y1="280" x2="48" y2="290"/>
    <line x1="352" y1="280" x2="352" y2="290"/>
    <line x1="200" y1="280" x2="200" y2="290"/>
  </g>
</svg>
